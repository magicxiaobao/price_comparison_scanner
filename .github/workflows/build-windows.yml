name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # ── Python + PyInstaller: 打包 backend sidecar ──
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build backend sidecar (PyInstaller --onedir)
        working-directory: backend
        run: pyinstaller backend.spec --noconfirm

      - name: Copy sidecar to Tauri resources
        run: |
          mkdir frontend\src-tauri\resources\sidecar
          xcopy /E /I backend\dist\backend\* frontend\src-tauri\resources\sidecar\
        shell: cmd

      # ── Node.js + pnpm: 前端依赖 ──
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      # ── Rust: Tauri 编译 ──
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      # ── Tauri Build ──
      - name: Build Tauri app (Windows x64)
        working-directory: frontend
        run: pnpm tauri build

      # ── Upload artifacts ──
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            frontend/src-tauri/target/release/bundle/nsis/*.exe
            frontend/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
